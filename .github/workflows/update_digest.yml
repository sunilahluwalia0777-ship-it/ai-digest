name: Daily Digest Update

on:
  schedule:
    - cron: '5 14 * * 1-6'  # 7:05am PDT Mon-Sat (14:05 UTC)
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Run update script
        env:
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          ANTHROPIC_KEY: ${{ secrets.ANTHROPIC_KEY }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: python update_digest.py

      - name: Commit and push
        run: |
          git config user.name "AI Infra Bot"
          git config user.email "actions@github.com"
          git add index.html data/
          git diff --staged --quiet || git commit -m "Daily digest — $(date +'%Y-%m-%d')"
          git push
