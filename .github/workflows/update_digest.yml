name: Daily Digest Update

on:
  schedule:
    - cron: '5 14 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Run update script
        env:
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          ANTHROPIC_KEY: ${{ secrets.ANTHROPIC_KEY }}
        run: python update_digest.py

      - name: Commit and push updated index.html
        run: |
          git config user.name "AI Infra Bot"
          git config user.email "actions@github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "Daily digest update — $(date +'%Y-%m-%d %H:%M UTC')"
          git push
